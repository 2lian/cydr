name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:

    strategy:
      fail-fast: false
      matrix:
        pixi-env: ["py310-np1", "py310-np2", "py311-np1", "py311-np2", "py312-np1", "py312-np2", "py313-np2", "py314-np2"]
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@v5
    - uses: prefix-dev/setup-pixi@v0.9.4
      with:
        cache: true
        environments: ${{ matrix.pixi-env }}
    - name: Test with pixi+pytest
      run: |
        pixi run -e ${{ matrix.pixi-env }} pytest -vv
